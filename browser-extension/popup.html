<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyManager Autofill</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="wrap">
    <h1>KeyManager</h1>

    <!-- ===========================
         VISTA: utente NON loggato
         Nascosta di default, mostrata se la sessione PHP non è attiva.
    =========================== -->
    <section id="viewNotLoggedIn" class="card card--center hidden">
      <p class="icon-lock">🔒</p>
      <p class="msg-login">Accedi a KeyManager per usare l'autofill.</p>
      <button id="loginBtn" type="button" class="btn-primary">Vai al login</button>
    </section>

    <!-- ===========================
         VISTA: utente LOGGATO
         Nascosta di default, mostrata se la sessione PHP è attiva.
    =========================== -->
    <div id="viewLoggedIn" class="hidden">

      <!-- Pulsante rapido per aprire la dashboard -->
      <div class="row row--right">
        <button id="dashboardBtn" type="button" class="btn-link">Apri Dashboard ↗</button>
      </div>

      <section class="card">
        <h2>Sincronizzazione</h2>
        <p id="statusText">Auto-sync attiva.</p>
        <div class="row">
          <button id="syncBtn" type="button">Sincronizza ora</button>
          <button id="clearBtn" type="button">Svuota cache</button>
        </div>
        <p class="small">Credenziali in cache: <strong id="cacheCount">0</strong></p>
        <p class="small">Ultima sync: <span id="lastSync">mai</span></p>
      </section>

      <section class="card">
        <h2>Sito corrente</h2>
        <p id="domainText">-</p>
        <p class="small">Clicca un campo username/password nella pagina per vedere i suggerimenti.</p>
        <button id="refreshBtn" type="button">Aggiorna stato</button>
      </section>

    </div>

    <p id="messageText" class="message"></p>
  </main>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
