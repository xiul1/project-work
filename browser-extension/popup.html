<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyManager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- NOT LOGGED IN -->
  <div id="viewNotLoggedIn" class="popup hidden">
    <header class="km-header">
      <svg class="km-logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="kg1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="50%" stop-color="#1A1A1A"/>
            <stop offset="50%" stop-color="#4A9FD8"/>
          </linearGradient>
        </defs>
        <path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z" stroke="url(#kg1)"/>
        <circle cx="16.5" cy="7.5" r=".5" stroke="url(#kg1)" fill="url(#kg1)"/>
      </svg>
      <span class="km-title"><span class="km-title-blue">Key</span>Manager</span>
    </header>
    <div class="km-login-card">
      <div class="km-login-lock">🔒</div>
      <p class="km-login-msg">Accedi a KeyManager per usare l'autofill.</p>
      <button id="loginBtn" class="km-btn-autofill km-btn-full">Vai al login</button>
    </div>
  </div>

  <!-- LOGGED IN -->
  <div id="viewLoggedIn" class="popup hidden">

    <!-- Header -->
    <header class="km-header">
      <svg class="km-logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="kg2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="50%" stop-color="#1A1A1A"/>
            <stop offset="50%" stop-color="#4A9FD8"/>
          </linearGradient>
        </defs>
        <path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z" stroke="url(#kg2)"/>
        <circle cx="16.5" cy="7.5" r=".5" stroke="url(#kg2)" fill="url(#kg2)"/>
      </svg>
      <span class="km-title"><span class="km-title-blue">Key</span>Manager</span>
      <div class="km-spacer"></div>
      <button class="km-icon-btn" id="syncBtn" title="Sincronizza">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
      <button class="km-icon-btn" id="settingsBtn" title="Impostazioni">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </header>

    <!-- Search -->
    <div class="km-search">
      <svg class="km-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search vault..." autocomplete="off">
    </div>

    <!-- Current Site -->
    <section class="km-section">
      <div class="km-label">CURRENT SITE</div>
      <div class="km-site-card">
        <div class="km-avatar" id="siteAvatar" style="background:#4285F4">G</div>
        <div class="km-site-info">
          <div class="km-site-name" id="siteName">-</div>
          <div class="km-site-sub" id="siteEmail">Nessuna credenziale trovata</div>
        </div>
        <button class="km-btn-autofill" id="autofillBtn" disabled>Autofill</button>
      </div>
    </section>

    <!-- Credenziali per il sito corrente -->
    <section class="km-section">
      <div class="km-label">CREDENZIALI PER QUESTO SITO</div>
      <div class="km-recent-list" id="siteCredentialsList"></div>
    </section>

    <div class="km-flex-grow"></div>

    <!-- Footer -->


  </div>

  <p id="messageText" class="km-message"></p>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
